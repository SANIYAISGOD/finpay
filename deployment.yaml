apiVersion: apps/v1
kind: Deployment
metadata:
  name: jss
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: jss
        image: jss-product
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
